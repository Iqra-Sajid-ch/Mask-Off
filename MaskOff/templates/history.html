<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detection History | Mask Off</title>
<link rel="stylesheet" href="{{ url_for('static', filename='maskoff-theme.css') }}">
<script src="{{ url_for('static', filename='theme.js') }}"></script>
<style>
:root {
  --primary: #5e3c66;
  --primary-light: #7a5b82;
  --bg: #f3eef6;
  --white: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --success: #8fd3c7;
  --danger: #d291bc;
  --radius: 16px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(to bottom, #6f4b77, #bca8c7);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  color: var(--text);
}

.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1100;
  height: 88px;
  background: var(--accent, #5e3c66);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  color: white;
}

.logo-container {
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
}

.logo-img { height: 76px; width: auto; }
.logo-text { font-size: 32px; font-weight: 800; letter-spacing: 0.5px; }
.navbar a { color: white; text-decoration: none; font-weight: 500; }

.container {
  max-width: 1200px;
  margin: 60px auto;
  padding: 0 20px;
  flex: 1;
  width: 100%;
}

.header { text-align: center; margin-bottom: 40px; color: white; }
.header h2 { font-size: 36px; margin-bottom: 10px; }
.header p { opacity: 0.9; }

.search-wrap {
  max-width: 640px;
  margin: 0 auto 16px auto;
  position: relative;
}

.search-bar {
  display: flex;
  gap: 0;
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

.search-bar input {
  flex: 1;
  padding: 14px 44px 14px 18px;
  border: none;
  outline: none;
  font-size: 15px;
}

.search-bar button.search-btn {
  padding: 14px 22px;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  font-weight: 600;
}

.search-bar button.search-btn:hover {
  background: var(--primary-light);
}

.search-clear {
  position: absolute;
  right: 108px;
  top: 50%;
  transform: translateY(-50%);
  background: #e5e7eb;
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  color: #555;
  display: none;
}

.search-clear.visible { display: block; }

.search-hint {
  text-align: center;
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  margin-bottom: 36px;
}

.search-status {
  text-align: center;
  color: white;
  margin-bottom: 20px;
  font-size: 14px;
  min-height: 20px;
}

.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
  gap: 30px;
}

.history-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border-radius: var(--radius);
  padding: 28px;
  color: white;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  transition: 0.3s ease;
}

.history-card:hover { transform: translateY(-5px); }

.card-header { margin-bottom: 15px; }
.card-header h3 { 
  font-size: 20px; 
  word-break: break-word; 
  word-wrap: break-word;
  overflow-wrap: break-word;
  hyphens: auto;
  line-height: 1.3;
  max-height: 3.9em;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.card-header span { 
  font-size: 14px; 
  opacity: 0.8;
  display: block;
  margin-top: 6px;
}

.divider {
  height: 1px;
  background: rgba(255,255,255,0.3);
  margin: 15px 0;
}

.result { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.result.fake { color: var(--danger); }
.result.real { color: var(--success); }
.confidence { margin-bottom: 10px; }

.progress {
  height: 8px;
  background: rgba(255,255,255,0.3);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 12px;
}

.progress-bar { height: 100%; border-radius: 20px; }
.progress-bar.fake { background: var(--danger); }
.progress-bar.real { background: var(--success); }

.meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 20px;
  font-size: 13px;
  margin-bottom: 18px;
}

.meta div {
  background: #f8f6fb;
  padding: 10px 12px;
  border-radius: 8px;
  color: #555;
  border: 1px solid #eee;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.meta div strong {
  display: block;
  color: #5e3c66;
  font-weight: 600;
  margin-bottom: 4px;
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-actions { display: flex; gap: 12px; }

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 500;
  transition: 0.2s;
}

.btn-light { background: white; color: var(--primary); }
.btn-light:hover { background: #f3e8ff; }
.btn-dark { background: var(--primary); color: white; }
.btn-dark:hover { background: var(--primary-light); }

footer {
  text-align: center;
  padding: 25px;
  margin-top: auto;
  background: #6f4b77;
  color: white;
  font-size: 14px;
}

/* View modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(31, 41, 55, 0.55);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal-panel {
  background: white;
  border-radius: 18px;
  max-width: 560px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 48px rgba(0,0,0,0.2);
}

.modal-header {
  background: linear-gradient(135deg, #6f4b77, #5e3c66);
  color: white;
  padding: 24px 28px;
  border-radius: 18px 18px 0 0;
  position: relative;
}

.modal-header h3 { font-size: 20px; margin-bottom: 6px; word-break: break-word; }
.modal-header p { font-size: 13px; opacity: 0.9; }

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
}

.modal-body { padding: 24px 28px 28px; }

.modal-verdict {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}

.modal-verdict.real { color: #0d9488; }
.modal-verdict.fake { color: #be185d; }

.modal-confidence {
  color: var(--muted);
  margin-bottom: 20px;
}

.modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.modal-grid div {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 12px;
  font-size: 13px;
}

.modal-grid strong { display: block; color: var(--primary); margin-bottom: 4px; }

.frame-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 12px;
  min-width: 100%;
}

.frame-table th {
  background: #5e3c66;
  color: white;
  padding: 12px;
  text-align: left;
  font-weight: 600;
}

.frame-table td {
  padding: 10px 12px;
  border-bottom: 1px solid #eee;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.frame-table tr:nth-child(even) { background: #faf5ff; }

.frame-table tr:hover { background: #f0e8ff; }

.frame-table-wrapper {
  overflow-x: auto;
  margin-top: 12px;
  border-radius: 8px;
  background: white;
  border: 1px solid #e5e7eb;
}

.frame-table-wrapper::-webkit-scrollbar {
  height: 8px;
}

.frame-table-wrapper::-webkit-scrollbar-track {
  background: #f5f5f5;
  border-radius: 8px;
}

.frame-table-wrapper::-webkit-scrollbar-thumb {
  background: #d0d0d0;
  border-radius: 8px;
}

.frame-table-wrapper::-webkit-scrollbar-thumb:hover {
  background: #b0b0b0;
}

.modal-footer {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.modal-footer .btn { flex: 1; }
</style>
</head>

<body class="page-history" data-maskoff-live-history>

<div class="navbar">
  <div class="logo-container" onclick="window.location.href='/'">
    <img src="{{ url_for('static', filename='final logo.png') }}" alt="Mask Off Logo" class="logo-img">
    <span class="logo-text">Mask Off</span>
  </div>
  <div class="maskoff-navbar-right">
    <a href="/" class="maskoff-nav-btn maskoff-nav-home">Home</a>
    <button type="button" class="maskoff-nav-btn maskoff-nav-logout" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <h2>Detection History</h2>
    <p>Review your previously analyzed media and download reports.</p>
  </div>

  <div class="search-wrap">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by filename, type, result, date..." autocomplete="off">
      <button type="button" class="search-btn" id="searchBtn">Search</button>
    </div>
    <button type="button" class="search-clear" id="searchClear" title="Clear search" aria-label="Clear search">×</button>
  </div>
  <p class="search-hint">Press Enter or click Search. Clear (×) to show all results again.</p>
  <p class="search-status" id="searchStatus"></p>

  <div class="history-grid" id="historyGrid"></div>
</div>

<footer>© 2026 MASK OFF · Deepfake Analysis System</footer>

<div class="modal-overlay" id="viewModal" role="dialog" aria-modal="true">
  <div class="modal-panel">
    <div class="modal-header">
      <button type="button" class="modal-close" id="modalCloseBtn" aria-label="Close">×</button>
      <h3 id="modalFilename">—</h3>
      <p id="modalDate">—</p>
    </div>
    <div class="modal-body">
      <div id="modalImageWrap" style="display:none;">
        <img id="modalPreviewImg" src="" alt="Media Preview" style="display:none;">
      </div>
      <div class="modal-verdict" id="modalVerdict">—</div>
      <div class="modal-confidence" id="modalConfidence">—</div>
      <div class="modal-grid" id="modalMeta"></div>
      <div id="modalFramesWrap" style="display:none;">
        <strong style="color:#5e3c66;">Per-frame analysis</strong>
        <div class="frame-table-wrapper">
          <table class="frame-table">
            <thead><tr><th>Frame</th><th>Result</th><th>Confidence</th></tr></thead>
            <tbody id="modalFrameRows"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <a href="/complaints" class="btn btn-light" id="modalComplaintLink">Report incorrect result</a>
        <button type="button" class="btn btn-dark" id="modalDownloadBtn">Download PDF</button>
        <button type="button" class="btn btn-light" id="modalCloseBtn2">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
let allDetections = [];
let activeSearchQuery = '';
let autoRefreshHistoryTimer = null;
let currentModalDetectionId = null;

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text == null ? '' : String(text);
  return d.innerHTML;
}

function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function getResultClass(verdict) {
  return (verdict || '').toLowerCase().includes('manipulated') ? 'fake' : 'real';
}

function scoreDetection(det, query) {
  const q = query.trim().toLowerCase();
  if (!q) return 1;

  let score = 0;
  const checks = [
    { value: det.filename, weight: 12 },
    { value: det.verdict, weight: 10 },
    { value: det.file_type, weight: 8 },
    { value: det.uploaded_at, weight: 6 },
    { value: det.confidence != null ? String(det.confidence) : '', weight: 4 },
  ];

  for (const { value, weight } of checks) {
    const s = String(value || '').toLowerCase();
    if (!s) continue;
    if (s === q) score += weight * 4;
    else if (s.startsWith(q)) score += weight * 3;
    else if (s.includes(q)) score += weight * 2;
    else {
      const words = q.split(/\s+/).filter(Boolean);
      if (words.every((w) => s.includes(w))) score += weight;
    }
  }

  if (det.real_frames != null && 'real'.includes(q)) score += 3;
  if (det.fake_frames != null && ('fake'.includes(q) || 'manipulated'.includes(q))) score += 3;

  if (det.frame_details) {
    det.frame_details.forEach((f) => {
      const fv = String(f.verdict || '').toLowerCase();
      if (fv.includes(q)) score += 2;
    });
  }

  return score;
}

function filterDetections(query) {
  if (!query.trim()) return [...allDetections];
  return allDetections
    .map((d) => ({ d, score: scoreDetection(d, query) }))
    .filter((x) => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .map((x) => x.d);
}

function buildVideoFrameSummary(detection) {
  if (detection.file_type !== 'video' || detection.total_frames == null) return '';
  let html = `
    <div class="meta" style="margin-top:12px;">
      <div><strong>Frames analyzed:</strong> ${detection.total_frames}</div>
      <div><strong>Real frames:</strong> ${detection.real_frames ?? 0}</div>
      <div><strong>Fake frames:</strong> ${detection.fake_frames ?? 0}</div>
      <div><strong>Method:</strong> Majority vote</div>
    </div>`;
  if (detection.frame_details && detection.frame_details.length) {
    const items = detection.frame_details.slice(0, 6).map((f) =>
      `F${f.frame}: ${f.verdict}`
    ).join(' · ');
    const more = detection.frame_details.length > 6
      ? ` (+${detection.frame_details.length - 6} more)`
      : '';
    html += `<p style="font-size:12px;margin-top:10px;opacity:0.9;">${escapeHtml(items)}${escapeHtml(more)}</p>`;
  }
  return html;
}

function createHistoryCard(detection) {
  const resultClass = getResultClass(detection.verdict);
  const resultText = resultClass === 'fake' ? 'Result: Likely Manipulated' : 'Result: Likely Real';
  const typeLabel = detection.file_type === 'video' ? 'Video' : 'Image';
  const card = document.createElement('div');
  card.className = 'history-card';
  card.dataset.id = detection.id;
  card.innerHTML = `
    <div class="card-header">
      <h3>${escapeHtml(detection.filename)}</h3>
      <span>Uploaded on ${escapeHtml(formatDate(detection.uploaded_at))}</span>
    </div>
    <div class="divider"></div>
    <div class="result ${resultClass}">${resultText}</div>
    <div class="confidence">Confidence: ${escapeHtml(detection.confidence)}%</div>
    <div class="progress">
      <div class="progress-bar ${resultClass}" style="width:${Math.min(100, Number(detection.confidence) || 0)}%"></div>
    </div>
    <div class="meta">
      <div><strong>Type:</strong> ${typeLabel}</div>
      <div><strong>Detected:</strong> ${escapeHtml(formatDate(detection.uploaded_at))}</div>
      <div><strong>Status:</strong> Completed</div>
    </div>
    ${buildVideoFrameSummary(detection)}
    <div class="card-actions">
      <button type="button" class="btn btn-light btn-view" data-id="${detection.id}">View Report</button>
      <button type="button" class="btn btn-dark btn-download" data-id="${detection.id}">Download PDF</button>
    </div>
  `;
  return card;
}

function renderDetections(list) {
  const grid = document.getElementById('historyGrid');
  const status = document.getElementById('searchStatus');

  if (!list.length) {
    grid.innerHTML = activeSearchQuery.trim()
      ? '<p style="color: white; text-align: center; grid-column: 1/-1;">No matches found. Try another keyword or clear search.</p>'
      : '<p style="color: white; text-align: center; grid-column: 1/-1;">No detections yet. Start by analyzing an image or video.</p>';
    status.textContent = activeSearchQuery.trim()
      ? `0 results for "${activeSearchQuery}"`
      : '';
    return;
  }

  grid.innerHTML = '';
  list.forEach((detection) => grid.appendChild(createHistoryCard(detection)));

  status.textContent = activeSearchQuery.trim()
    ? `Showing ${list.length} match${list.length === 1 ? '' : 'es'} for "${activeSearchQuery}"`
    : `Showing all ${list.length} detection${list.length === 1 ? '' : 's'}`;

  grid.querySelectorAll('.btn-view').forEach((btn) => {
    btn.addEventListener('click', () => openViewModal(Number(btn.dataset.id)));
  });
  grid.querySelectorAll('.btn-download').forEach((btn) => {
    btn.addEventListener('click', () => downloadDetectionPdf(Number(btn.dataset.id)));
  });

  window.dispatchEvent(new CustomEvent('maskoff:history-refresh'));
}

function applySearch() {
  activeSearchQuery = document.getElementById('searchInput').value;
  const clearBtn = document.getElementById('searchClear');
  clearBtn.classList.toggle('visible', activeSearchQuery.trim().length > 0);
  renderDetections(filterDetections(activeSearchQuery));
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  activeSearchQuery = '';
  document.getElementById('searchClear').classList.remove('visible');
  renderDetections(allDetections);
}

async function loadHistory() {
  try {
    const response = await fetch('/api/get-history', { credentials: 'same-origin' });
    if (!response.ok) {
      console.error('Failed to load history');
      return;
    }
    const data = await response.json();
    allDetections = data.detections || [];
    applySearch();
  } catch (error) {
    console.error('Error loading history:', error);
  }
}

function openViewModal(detectionId) {
  const det = allDetections.find((d) => d.id === detectionId);
  if (!det) return;

  currentModalDetectionId = detectionId;
  const resultClass = getResultClass(det.verdict);

  document.getElementById('modalFilename').textContent = det.filename || '—';
  document.getElementById('modalDate').textContent = det.uploaded_at
    ? `Analyzed on ${formatDate(det.uploaded_at)}`
    : '';
  document.getElementById('modalVerdict').textContent = det.verdict || '—';
  document.getElementById('modalVerdict').className = `modal-verdict ${resultClass}`;
  document.getElementById('modalConfidence').textContent =
    `Confidence: ${det.confidence}%`;

  const imgWrap = document.getElementById('modalImageWrap');
  if (imgWrap) imgWrap.style.display = 'none';

  let metaHtml = `
    <div><strong>Type</strong>${escapeHtml((det.file_type || '').toUpperCase())}</div>
    <div><strong>Status</strong>Completed</div>
  `;
  if (det.file_type === 'video' && det.total_frames != null) {
    metaHtml += `
      <div><strong>Frames</strong>${det.total_frames} analyzed</div>
      <div><strong>Real / Fake</strong>${det.real_frames ?? 0} / ${det.fake_frames ?? 0}</div>
    `;
  }
  document.getElementById('modalMeta').innerHTML = metaHtml;

  const framesWrap = document.getElementById('modalFramesWrap');
  const frameRows = document.getElementById('modalFrameRows');
  if (det.frame_details && det.frame_details.length) {
    framesWrap.style.display = 'block';
    frameRows.innerHTML = det.frame_details.map((f) => `
      <tr>
        <td>Frame ${f.frame}</td>
        <td>${escapeHtml(f.verdict)}</td>
        <td>${escapeHtml(f.confidence)}%</td>
      </tr>
    `).join('');
  } else {
    framesWrap.style.display = 'none';
    frameRows.innerHTML = '';
  }

  const complaintLink = document.getElementById('modalComplaintLink');
  if (complaintLink) {
    complaintLink.href =
      `/complaints?detection_id=${detectionId}&category=incorrect_detection`;
  }

  document.getElementById('viewModal').classList.add('open');
}

function closeViewModal() {
  document.getElementById('viewModal').classList.remove('open');
  currentModalDetectionId = null;
}

async function downloadDetectionPdf(detectionId) {
  try {
    const response = await fetch(
      `/api/download-report?detection_id=${detectionId}`,
      { credentials: 'same-origin' }
    );
    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      alert(err.error || 'Error generating report');
      return;
    }
    const contentType = response.headers.get('content-type') || '';
    if (!contentType.includes('application/pdf')) {
      const err = await response.json().catch(() => ({}));
      alert(err.error || 'PDF could not be generated. Restart the Flask app and try again.');
      return;
    }
    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const det = allDetections.find((d) => d.id === detectionId);
    const base = (det && det.filename) ? det.filename.replace(/[^a-z0-9._-]+/gi, '_').slice(0, 30) : 'detection';
    a.download = `mask_off_${base}_${detectionId}.pdf`;
    document.body.appendChild(a);
    a.click();
    window.URL.revokeObjectURL(url);
    document.body.removeChild(a);
  } catch (error) {
    console.error('Error downloading report:', error);
    alert('Failed to download report');
  }
}

function setupHistoryAutoRefresh() {
  if (autoRefreshHistoryTimer) clearInterval(autoRefreshHistoryTimer);
  const settings = window.MaskOff ? window.MaskOff.getSettings() : {};
  if (settings.notifications) {
    autoRefreshHistoryTimer = setInterval(loadHistory, 10000);
  }
}

document.getElementById('searchBtn').addEventListener('click', applySearch);
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') applySearch();
});
document.getElementById('searchClear').addEventListener('click', clearSearch);
document.getElementById('searchInput').addEventListener('input', () => {
  if (document.getElementById('searchInput').value === '') clearSearch();
});
document.getElementById('modalCloseBtn').addEventListener('click', closeViewModal);
document.getElementById('modalCloseBtn2').addEventListener('click', closeViewModal);
document.getElementById('modalDownloadBtn').addEventListener('click', () => {
  if (currentModalDetectionId) downloadDetectionPdf(currentModalDetectionId);
});
document.getElementById('viewModal').addEventListener('click', (e) => {
  if (e.target.id === 'viewModal') closeViewModal();
});

window.addEventListener('maskoff:preference-changed', (e) => {
  if (e.detail.name === 'notifications') setupHistoryAutoRefresh();
});
window.addEventListener('maskoff:history-refresh', () => {});

document.addEventListener('DOMContentLoaded', () => {
  loadHistory();
  setupHistoryAutoRefresh();
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  if (confirm('Are you sure you want to logout?')) {
    if (window.MaskOff && MaskOff.clearSessionStorageOnly) MaskOff.clearSessionStorageOnly();
    window.location.href = '/logout';
  }
});
</script>
</body>
</html>
