<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Detection | Mask Off</title>
<link rel="stylesheet" href="{{ url_for('static', filename='maskoff-theme.css') }}">
<script src="{{ url_for('static', filename='theme.js') }}"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  padding-top: 88px;
}

.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1100;
  height: 88px;
  padding: 0 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--nav-bg, #5e3c66);
  color: white;
}


.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-img {
  height: 76px;
  width: auto;
}

.logo-text {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 0.5px;
}


.nav-actions {
  display: flex;
  align-items: center;
  gap: 24px;
  position: relative;
  z-index: 2;
}

.nav-link {
  color: white;
  text-decoration: none;
  font-weight: 600;
  cursor: pointer;
}

.nav-link:hover {
  text-decoration: underline;
}

.btn-nav-home {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 22px;
  border-radius: 10px;
  border: 2px solid rgba(255, 255, 255, 0.85);
  background: transparent;
  color: #ffffff !important;
  text-decoration: none !important;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  position: relative;
  z-index: 2;
  transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
}

.btn-nav-home:hover {
  text-decoration: none !important;
  transform: translateY(-1px);
  background: #ffffff;
  color: var(--accent, #5e3c66) !important;
}

.profile {
  font-size: 20px;
  cursor: pointer;
}

.hero {
  max-width: 1200px;
  margin: 60px auto;
  padding: 0 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: center;
}

.hero h1 {
  font-size: 44px;
  line-height: 1.2;
  margin-bottom: 16px;
}

.hero h1 span {
  color: var(--accent);
}

.hero p {
  color: var(--muted);
  font-size: 18px;
  margin-bottom: 24px;
}

.hero-image {
  width: 100%;
  max-width: 100%;
  aspect-ratio: 16/9;
  border-radius: 16px;
  overflow: hidden;
  background: black;
}

.hero-image img {
  width: 100%;
  height: 100%;
  max-width: 100%;
  object-fit: cover;
  display: block;
}

.scanner {
  max-width: 1000px;
  margin: 80px auto;
  padding: 0 24px;
}

.card {
  background: var(--card);
  border-radius: 18px;
  padding: 32px;
  border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

.upload-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: center;
}

.image-preview {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 14px;
  border: 2px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fafafa;
  overflow: hidden;
}

.image-preview img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.upload h3 {
  margin-bottom: 8px;
}

.upload p {
  color: var(--muted);
}

.upload button {
  margin-top: 14px;
  padding: 12px 24px;
  border-radius: 10px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

.upload .primary {
  background: var(--accent);
  color: white;
}

.upload .secondary {
  background: white;
  border: 1px solid var(--border);
}

.results {
  margin-top: 32px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.result {
  background: #f9fafb;
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  border: 1px solid var(--border);
}

.result strong {
  font-size: 22px;
  color: var(--accent);
}

@media (max-width: 900px) {
  .hero {
    grid-template-columns: 1fr;
  }

  .upload-layout {
    grid-template-columns: 1fr;
  }

  .hero-image {
    width: 100%;
  }
}

section.scanner-nav {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px 24px 0;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 26px;
  margin-bottom: 0;
  border: none;
  border-radius: 12px;
  background: var(--button-bg, var(--accent, #5e3c66));
  color: #ffffff !important;
  text-decoration: none !important;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(94, 60, 102, 0.28);
  transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
}

.back-btn:hover {
  text-decoration: none !important;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(94, 60, 102, 0.35);
  filter: brightness(1.08);
  color: #ffffff !important;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">
    <img src="{{ url_for('static', filename='final logo.png') }}" alt="Mask Off Logo" class="logo-img">
    <span class="logo-text">Mask Off</span>
  </div>
  <div class="nav-actions maskoff-navbar-right">
    <a href="/" class="maskoff-nav-btn maskoff-nav-home">Home</a>
    <button type="button" class="maskoff-nav-btn maskoff-nav-logout" onclick="logout()">Logout</button>
  </div>
</div>

<section class="hero">
  <div>
    <h1>Scan & Detect <span>Deepfake Images</span></h1>
    <p>
      Upload an image to analyze whether it has been synthetically generated
      or manipulated using AI.
    </p>
  </div>

  <div class="hero-image">
    <img src="{{ url_for('static', filename='image detection.png') }}" alt="AI face">
  </div>
</section>

<section class="scanner">
  <div class="card">

    <div class="upload-layout">
      <div class="image-preview" id="preview">
        <span style="color:var(--muted)">No image selected</span>
      </div>

      <div class="upload">
        <h3>Upload Image for Analysis</h3>
        <p>Supported formats: JPG, PNG • Max size: 10MB</p>

        <input type="file" id="imageInput" hidden accept="image/*">

        <button class="primary" onclick="imageInput.click()">Upload Image</button>
        <button class="secondary" onclick="loadDemo()">Use Demo Image</button>
      </div>
    </div>

    <div class="results">
      <div class="result">
        <span>Status</span><br>
        <strong id="status">—</strong>
      </div>
      <div class="result">
        <span>Confidence</span><br>
        <strong id="confidence">—</strong>
      </div>
      <div class="result">
        <span>Verdict</span><br>
        <strong id="verdict">—</strong>
      </div>
    </div>

  </div>
</section>

<script>

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", () => {
  const file = imageInput.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  preview.innerHTML = `<img src="${url}">`;
  runDetection(file);
});

function loadDemo() {
  preview.innerHTML =
    `<img src="{{ url_for('static', filename='image detection.png') }}">`;
  document.getElementById("status").innerText = "Upload an image to scan.";
  document.getElementById("confidence").innerText = "—";
  document.getElementById("verdict").innerText = "—";
}

async function runDetection(file) {
  document.getElementById("status").innerText = "Scanning...";
  document.getElementById("confidence").innerText = "—";
  document.getElementById("verdict").innerText = "—";

  const formData = new FormData();
  formData.append("image", file);

  try {
    const response = await fetch("/api/detect-image", {
      method: "POST",
      body: formData,
    });

    const result = await response.json();

    if (!response.ok) {
      document.getElementById("status").innerText = "Error";
      document.getElementById("confidence").innerText = "—";
      document.getElementById("verdict").innerText = result.message || "Unable to scan";
      return;
    }

    document.getElementById("status").innerText = result.status;
    document.getElementById("confidence").innerText = result.confidence;
    document.getElementById("verdict").innerText = result.verdict;

    if (window.MaskOff) {
      MaskOff.notify(
        "Scan complete",
        `Verdict: ${result.verdict} (${result.confidence})`
      );
    }
  } catch (error) {
    document.getElementById("status").innerText = "Error";
    document.getElementById("confidence").innerText = "—";
    document.getElementById("verdict").innerText = "Server unavailable";
  }
}

function logout() {
  if (!confirm("Are you sure you want to logout?")) return;
  if (window.MaskOff) MaskOff.clearSessionStorageOnly();
  window.location.href = "/logout";
}
</script>

</body>
</html>
